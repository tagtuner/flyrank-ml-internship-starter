<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniTech | Zero-Trust Network & Systems Architecture Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap');
    
    body {
      margin: 0;
      padding: 40px;
      background-color: #fcfbfa;
      color: #1a1a19;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    p.lead {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
      margin: 0;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #fff;
      color: #1a1a19;
      text-decoration: none;
      border: 1px solid #e6e4df;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: #cc785c;
      color: #cc785c;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      background-color: #cc785c;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 20px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a19" stroke-width="6" />
        <circle cx="50" cy="50" r="30" fill="none" stroke="#cc785c" stroke-width="4" stroke-dasharray="8 4" />
        <line x1="50" y1="20" x2="50" y2="80" stroke="#1a1a19" stroke-width="6" stroke-linecap="round" />
        <line x1="30" y1="35" x2="70" y2="35" stroke="#cc785c" stroke-width="5" stroke-linecap="round" />
      </svg>
    </div>

    <h1>OmniTech</h1>
    <p class="lead">
      I design and audit zero-trust enterprise networks using PfSense firewalls.
    </p>

    <span class="status-badge">Empty but Live</span>

    <div class="nav-links">
      <a href="work/sitemap_sketch.html" class="btn">Sitemap sketch</a>
      <a href="work/identity_kit.html" class="btn">Identity Kit</a>
    </div>
  </div>

</body>
</html>
